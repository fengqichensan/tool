services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitor-system
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - monitor-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  monitor-data: